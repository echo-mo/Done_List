<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>我的待办清单</title>
  <meta name="description" content="简约现代的待办清单静态页面（单文件，HTML + 内嵌 CSS）。">
  <style>
    /* 基本配色与变量 */
    :root{
      --bg: #f5f7fb;         /* 页面背景 */
      --card: #ffffff;       /* 卡片背景 */
      --primary: #0ea5a4;    /* 主色（青绿色） */
      --muted: #6b7280;      /* 次要文字 */
      --danger: #ef4444;     /* 删除颜色 */
      --radius: 12px;
      --max-width: 500px;    /* 页面最大宽度 */
    }

    /* 全局样式 */
    *{box-sizing:border-box}
    html,body{height:100%}
    body{
      margin:0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", "Noto Sans SC", Arial;
      background:var(--bg);
      color:#0f172a;
      -webkit-font-smoothing:antialiased;
      -moz-osx-font-smoothing:grayscale;
      padding:24px 16px; /* 在小屏幕留出一些边距 */
    }

    /* 页面容器，居中且有最大宽度 */
    .container{
      max-width:var(--max-width);
      margin:0 auto;
    }

    /* 顶部标题区域 */
    .app-card{
      background:var(--card);
      border-radius:calc(var(--radius) + 4px);
      padding:18px;
      box-shadow:0 8px 30px rgba(15,23,42,0.06);
    }
    .title{
      margin:0 0 8px 0;
      font-size:1.25rem;
      font-weight:600;
    }
    .subtitle{
      margin:0;color:var(--muted);font-size:0.95rem
    }

    /* 输入区域：输入框与按钮水平排列 */
    .input-row{
      display:flex;
      gap:10px;
      margin-top:14px;
      align-items:center;
    }
    /* 输入框样式 */
    .input-row input{
      flex:1;
      padding:12px 14px;
      border-radius:10px;
      border:1px solid rgba(15,23,42,0.06);
      background:transparent;
      font-size:1rem;
      outline:none;
    }
    /* 添加按钮，较大触控目标 */
    .btn-add{
      background:linear-gradient(180deg,var(--primary),#028f8e);
      color:white;border:0;padding:11px 14px;border-radius:10px;font-weight:600;cursor:pointer;
      box-shadow:0 6px 18px rgba(14,165,164,0.15);
    }

    /* 任务列表 */
    .task-list{list-style:none;padding:0;margin:18px 0 0 0;display:flex;flex-direction:column;gap:12px}
    .task{
      display:flex;align-items:center;justify-content:space-between;padding:12px;border-radius:10px;background:var(--card);
      border:1px solid rgba(15,23,42,0.04);
    }
    .task-text{font-size:1rem;color:inherit}
    .task .meta{color:var(--muted);font-size:0.85rem}

    /* 操作按钮组 */
    .actions{display:flex;gap:8px;align-items:center}
    .actions button{border:0;padding:8px 10px;border-radius:8px;font-weight:600;cursor:pointer}
    .btn-complete{background:transparent;color:var(--primary)}
    .btn-delete{background:transparent;color:var(--danger)}

    /* 已完成任务样式 */
    .task.completed .task-text{color:var(--muted);text-decoration:line-through;opacity:0.9}

    /* 响应式：在极窄屏下微调间距与字体 */
    @media (max-width:380px){
      .title{font-size:1.1rem}
      .input-row input{padding:10px}
      .btn-add{padding:10px}
      .task{padding:10px}
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- 主卡片：包含标题、输入区与任务列表 -->
    <section class="app-card">
      <!-- 标题：用户可直接修改这里的文本 -->
      <header>
        <h1 class="title">我的待办清单</h1>
        <p class="subtitle">简单、清爽，适合职场新人快速记录待办。</p>
      </header>

      <!-- 输入区域：目前仅样式（无 JS 功能） -->
      <div class="input-row">
        <!-- 隐藏标签用于无障碍（屏幕阅读器） -->
        <label for="task-input" class="sr-only">输入新任务</label>
        <input id="task-input" type="text" placeholder="输入新任务，例如：完成项目报告">
        <button class="btn-add" aria-label="添加任务">添加</button>
      </div>

      <!-- 任务列表：预先放置 3 条示例数据，用于展示样式 -->
      <ul class="task-list" aria-live="polite">
        <!-- 单条任务结构：任务内容 + 操作按钮 -->
        <li class="task">
          <span class="task-text">完成项目报告</span>
          <div class="actions">
            <button class="btn-complete" aria-label="标记完成">完成</button>
            <button class="btn-delete" aria-label="删除任务">删除</button>
          </div>
        </li>

        <li class="task">
          <span class="task-text">买牛奶</span>
          <div class="actions">
            <button class="btn-complete" aria-label="标记完成">完成</button>
            <button class="btn-delete" aria-label="删除任务">删除</button>
          </div>
        </li>

        <li class="task completed">
          <span class="task-text">给妈妈打电话</span>
          <div class="actions">
            <button class="btn-complete" aria-label="标记未完成">取消</button>
            <button class="btn-delete" aria-label="删除任务">删除</button>
          </div>
        </li>
      </ul>

    </section>
  </div>

  <!-- 屏幕阅读器隐藏类 -->
  <style>
    .sr-only{position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;border:0}
  </style>

  <!-- 以下为原生 JavaScript：实现“添加任务”功能（含中文注释） -->
  <script>
    // 获取页面上的关键元素
    const taskInput = document.getElementById('task-input'); // 输入框
    const addButton = document.querySelector('.btn-add'); // 添加按钮
    const taskList = document.querySelector('.task-list'); // 任务列表容器

    /**
     * 创建一个任务列表项的 DOM 元素
     * @param {string} text 任务文本
     * @returns {HTMLElement} li 元素
     */
    // 创建任务元素：支持初始状态（completed）
    function createTaskElement(text, completed = false) {
      const li = document.createElement('li');
      li.className = 'task';
      if (completed) li.classList.add('completed');

      // 任务文本节点
      const span = document.createElement('span');
      span.className = 'task-text';
      span.textContent = text;

      // 操作按钮容器
      const actions = document.createElement('div');
      actions.className = 'actions';

      // 完成按钮（使用事件委托统一处理）
      const completeBtn = document.createElement('button');
      completeBtn.type = 'button';
      completeBtn.className = 'btn-complete';
      // 如果初始为已完成，则按钮文字显示为“取消”
      completeBtn.textContent = completed ? '取消' : '完成';

      // 删除按钮（使用事件委托统一处理）
      const deleteBtn = document.createElement('button');
      deleteBtn.type = 'button';
      deleteBtn.className = 'btn-delete';
      deleteBtn.textContent = '删除';

      // 组装节点
      actions.appendChild(completeBtn);
      actions.appendChild(deleteBtn);
      li.appendChild(span);
      li.appendChild(actions);

      return li;
    }

    /**
     * 添加任务：读取输入、校验非空、创建元素并追加到列表、清空输入
     */
    async function addTask() {
      const text = taskInput.value.trim();
      // 如果输入为空则不处理
      if (!text) return;

      const taskItem = createTaskElement(text);
      taskList.appendChild(taskItem);
      // 清空并聚焦输入框，方便继续添加
      taskInput.value = '';
      taskInput.focus();

      // 新增任务后保存当前列表到本地或远端
      if (API_BASE) await saveTasksToServer().catch(err => console.warn('保存到服务器失败：', err));
      else saveTasks();
    }

    // 点击按钮触发添加
    addButton.addEventListener('click', addTask);

    // 按回车也触发添加，增强体验
    taskInput.addEventListener('keydown', function (e) {
      if (e.key === 'Enter') addTask();
    });

    /*
      使用事件委托统一处理任务列表中的“完成”和“删除”按钮。
      优点：
        - 对静态存在的任务按钮有效（页面加载时已在 DOM 中）
        - 对之后动态添加的任务也有效（无需为每个新按钮重复绑定事件）
        - 保持代码简洁，避免重复绑定导致的多次触发问题
    */
    taskList.addEventListener('click', async function (e) {
      const target = e.target;

      // 如果点击的是删除按钮，则只移除对应的任务项
      if (target.classList.contains('btn-delete')) {
        const li = target.closest('li.task');
        if (li) taskList.removeChild(li);
        // 删除后保存（远端或本地）
        if (API_BASE) await saveTasksToServer().catch(err => console.warn('保存到服务器失败：', err));
        else saveTasks();
        return;
      }

      // 如果点击的是完成按钮，则切换该任务的完成状态（toggle）
      // 首次点击：添加 "completed" 样式 -> 显示删除线、变灰；按钮文字显示为 "取消"
      // 再次点击：移除 "completed" -> 恢复正常显示；按钮文字显示为 "完成"
      if (target.classList.contains('btn-complete')) {
        const li = target.closest('li.task');
        if (li) {
          li.classList.toggle('completed');
          // 根据当前状态设置按钮文字为“取消”或“完成”
          target.textContent = li.classList.contains('completed') ? '取消' : '完成';
          // 状态改变后保存（远端或本地）
          if (API_BASE) await saveTasksToServer().catch(err => console.warn('保存到服务器失败：', err));
          else saveTasks();
        }
      }
    });

    /**
     * 将当前任务列表保存到 localStorage（key: "todoList"）
     * 数据格式为 JSON 数组，每项为 { text: string, completed: boolean }
     */
    function saveTasks() {
      const tasks = Array.from(taskList.querySelectorAll('li.task')).map(li => ({
        text: li.querySelector('.task-text').textContent,
        completed: li.classList.contains('completed')
      }));
      try {
        localStorage.setItem('todoList', JSON.stringify(tasks));
      } catch (err) {
        // localStorage 写入可能在隐私模式或存储被禁用时失败，这里静默处理
        console.warn('无法保存到 localStorage:', err);
      }
    }

    /**
     * 从 localStorage 读取任务并初始化列表
     * 如果没有已保存的数据，则初始化为空列表（符合需求）
     */
    function loadTasks() {
      try {
        const raw = localStorage.getItem('todoList');
        if (!raw) {
          // 没有数据：清空任何静态示例，显示空列表
          taskList.innerHTML = '';
          return;
        }
        const tasks = JSON.parse(raw);
        if (!Array.isArray(tasks)) throw new Error('格式不正确');

        // 清空当前列表并根据保存的数据重建
        taskList.innerHTML = '';
        tasks.forEach(t => {
          const li = createTaskElement(t.text, Boolean(t.completed));
          taskList.appendChild(li);
        });
      } catch (err) {
        console.warn('读取 localStorage 失败，已初始化为空列表：', err);
        taskList.innerHTML = '';
      }
    }

    // 配置：如果你部署了后端到 Zeabur，请把 API_BASE 改为你的应用域名（不要以斜杠结尾）
    // 例：const API_BASE = 'https://your-app.zeabur.app'
    const API_BASE = ''; // <-- 默认为空，使用 localStorage；部署后设置为你的后端地址以启用跨设备同步

    // 页面加载时初始化任务列表：优先尝试从远端（若配置），否则使用 localStorage
    (async function init() {
      if (API_BASE) {
        // 尝试从后端加载；失败则回退到 localStorage
        try {
          await loadTasksFromServer();
          return;
        } catch (err) {
          console.warn('从服务器加载失败，回退到 localStorage：', err);
        }
      }
      loadTasks();
    })();

    /**
     * 从后端读取任务（bulk GET），并用数据初始化列表
     */
    async function loadTasksFromServer() {
      const res = await fetch(API_BASE + '/api/tasks');
      if (!res.ok) throw new Error('fetch failed');
      const tasks = await res.json();
      if (!Array.isArray(tasks)) throw new Error('invalid format');
      taskList.innerHTML = '';
      tasks.forEach(t => {
        const li = createTaskElement(t.text, Boolean(t.completed));
        taskList.appendChild(li);
      });
    }

    /**
     * 将当前任务列表推送到后端（bulk PUT）
     */
    async function saveTasksToServer() {
      const tasks = Array.from(taskList.querySelectorAll('li.task')).map(li => ({
        text: li.querySelector('.task-text').textContent,
        completed: li.classList.contains('completed')
      }));
      const res = await fetch(API_BASE + '/api/tasks', {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(tasks)
      });
      if (!res.ok) throw new Error('save failed');
    }

    // 页面加载时初始化结束
  </script>
</body>
</html>
