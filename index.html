<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>My Done List</title>
  <meta name="description" content="Dream big, act daily, get things done.">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
  <style>
    :root {
      --c-primary: #667eea;
      --c-secondary: #764ba2;
      --c-danger: #ef5350;
      --c-edit: #42a5f5;
      --c-success: #66bb6a;
      --c-cancel: #b0bec5;
      --c-undo: #ffa726;
      --c-badge-bg: rgba(102,126,234,0.15);
      --c-task-bg: hsl(255,35%,95%);
      --c-completed-bg: #f5f5f5;
      --c-text-muted: #666;
      --c-checkbox-border: hsl(252,74%,52%);
      --c-checkbox-checked: hsl(252,74%,52%);
      --c-edit-drawer-border: hsl(255,50%,85%);
      --c-edit-drawer-focus: hsl(255,74%,52%);
      --c-edit-drawer-save: hsl(255,74%,52%);
      --c-swipe-edit: hsl(255,74%,52%);
      --c-heatmap-0: hsl(255,35%,95%);
      --c-heatmap-1: hsl(255,48%,84%);
      --c-heatmap-2: hsl(255,60%,72%);
      --c-heatmap-3: hsl(255,68%,61%);
      --c-heatmap-4: hsl(255,74%,52%);
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, var(--c-primary) 0%, var(--c-secondary) 100%);
      min-height: 100vh;
      padding: 20px;
      color: #333;
      -webkit-font-smoothing: antialiased;
    }

    .container { max-width: 900px; margin: 0 auto; }
    .app-card { background: white; border-radius: 20px; padding: 30px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); }

    .title { color: var(--c-primary); text-align: center; margin-bottom: 10px; font-size: 2.5em; }
    .subtitle { text-align: center; color: var(--c-text-muted); margin-bottom: 30px; font-style: italic; }

    .quote { background: #f0f4ff; padding: 15px; border-left: 4px solid var(--c-primary); margin-bottom: 30px; border-radius: 5px; font-style: italic; color: #555; }

    .stats {
      background: linear-gradient(135deg, var(--c-primary) 0%, var(--c-secondary) 100%);
      color: white; padding: 20px; border-radius: 15px; text-align: center; margin-bottom: 30px;
    }
    .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 20px; margin-top: 15px; }
    .stat-item { background: rgba(255,255,255,0.2); padding: 15px; border-radius: 10px; }
    .stat-number { font-size: 2em; font-weight: bold; }
    .stat-label { font-size: 0.9em; opacity: 0.9; }

    /* 分类切换栏 */
    .category-tabs { display: flex; gap: 0; margin-bottom: 20px; border-radius: 12px; overflow: hidden; border: 2px solid var(--c-primary); }
    .category-tab {
      flex: 1; padding: 10px 0; border: none; background: white; color: var(--c-primary);
      font-size: 0.95em; font-weight: 600; cursor: pointer; transition: background 0.3s, color 0.3s; position: relative;
    }
    .category-tab:not(:last-child) { border-right: 1px solid var(--c-primary); }
    .category-tab.active { background: var(--c-primary); color: white; }
    .category-tab:hover:not(.active) { background: rgba(102,126,234,0.1); }

    .task-category-badge {
      display: inline-block; font-size: 0.7em; padding: 1px 6px; border-radius: 4px;
      background: var(--c-badge-bg); color: var(--c-primary); margin-left: 6px;
      vertical-align: middle; font-weight: 600; text-transform: capitalize;
    }

    .input-row { display: flex; gap: 10px; margin-bottom: 20px; align-items: center; }
    .input-row input { flex: 1; padding: 12px; border: 2px solid #e0e0e0; border-radius: 10px; font-size: 1em; transition: border-color 0.3s; }
    .input-row input:focus { outline: none; border-color: var(--c-primary); }
    .btn-add { padding: 12px 24px; background: var(--c-primary); color: white; border: none; border-radius: 10px; cursor: pointer; font-size: 1em; transition: background 0.3s; }
    .btn-add:hover { filter: brightness(0.9); }

    .task-list { list-style: none; padding: 0; margin: 0; }
    .task {
      background: var(--c-task-bg); padding: 15px; border-radius: 10px; margin-bottom: 10px;
      display: flex; justify-content: space-between; align-items: center; gap: 15px;
      transition: transform 0.2s; position: relative;
    }
    .task:hover { transform: translateX(5px); }
    .task.completed { background: var(--c-completed-bg); }
    .task-text { font-size: 1em; line-height: 1.5; }
    .task.completed .task-text { color: var(--c-text-muted); }

    .actions { display: flex; gap: 10px; flex-wrap: wrap; }
    .actions button { padding: 6px 12px; font-size: 0.9em; border: none; border-radius: 6px; cursor: pointer; transition: background 0.3s; }
    .btn-complete { background: var(--c-success); color: white; }
    .btn-delete { background: var(--c-danger); color: white; }
    .btn-edit { background: var(--c-edit); color: white; }
    .btn-save { background: var(--c-success); color: white; }
    .btn-cancel { background: var(--c-cancel); color: #263238; }
    .btn-undo { background: var(--c-undo); color: white; }

    .task-date { font-size: 0.85em; color: var(--c-text-muted); margin-top: 4px; }
    .task.completed .task-date { color: #888; }
    .task-content { flex: 1; min-width: 0; }
    .task-inner { display: flex; flex: 1; align-items: center; justify-content: space-between; gap: 15px; min-width: 0; will-change: transform; }
    .task > .btn-edit-swipe { display: none; }
    .task > .btn-delete { padding: 6px 12px; font-size: 0.9em; border: none; border-radius: 6px; cursor: pointer; transition: background 0.3s; flex-shrink: 0; }

    .task-checkbox {
      width: 24px; height: 24px; min-width: 24px;
      border: 2px solid var(--c-checkbox-border); border-radius: 50%; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.2s, border-color 0.2s; flex-shrink: 0;
    }
    .task-checkbox.checked { background: var(--c-checkbox-checked); border-color: var(--c-checkbox-checked); }
    .task-checkbox.checked::after { content: '✓'; color: white; font-size: 13px; line-height: 1; }

    .section-title { color: var(--c-secondary); font-size: 1.2em; margin-bottom: 15px; }
    .done-section { margin-top: 30px; padding-top: 20px; border-top: 1px solid #e0e0e0; }
    .done-list { list-style: none; padding: 0; margin: 0; }
    .done-list .task { background: var(--c-completed-bg); }
    .done-list .task-text { color: var(--c-text-muted); }
    .edit-fields { display: flex; flex-direction: column; gap: 8px; margin-bottom: 8px; }
    .edit-fields input[type="text"], .edit-fields input[type="date"] { padding: 10px; border: 2px solid var(--c-primary); border-radius: 10px; font-size: 1em; }

    .query-section { margin-top: 30px; padding-top: 20px; border-top: 1px solid #e0e0e0; }
    .query-row { display: flex; gap: 10px; align-items: center; margin-bottom: 15px; flex-wrap: wrap; }
    .query-row label { font-size: 0.9em; color: var(--c-text-muted); }
    .query-row input[type="date"] { padding: 10px; border: 2px solid #e0e0e0; border-radius: 10px; font-size: 1em; }
    .calendar-view-wrap { display: flex; gap: 24px; align-items: flex-start; margin-bottom: 20px; flex-wrap: wrap; }
    .heatmap-box { display: flex; flex-direction: column; gap: 4px; }
    .heatmap-row { display: flex; gap: 4px; flex-wrap: nowrap; }
    .heatmap-cell { width: 14px; height: 14px; border-radius: 3px; background: #ebedf0; cursor: pointer; transition: transform 0.15s; }
    .heatmap-cell:hover { transform: scale(1.15); }
    .heatmap-cell[data-level="0"] { background: var(--c-heatmap-0); }
    .heatmap-cell[data-level="1"] { background: var(--c-heatmap-1); }
    .heatmap-cell[data-level="2"] { background: var(--c-heatmap-2); }
    .heatmap-cell[data-level="3"] { background: var(--c-heatmap-3); }
    .heatmap-cell[data-level="4"] { background: var(--c-heatmap-4); }
    .query-results-wrap { flex: 1; min-width: 200px; }
    .query-results { min-height: 20px; }
    .query-results .task { margin-bottom: 10px; background: var(--c-task-bg); }
    .query-results .task.completed { background: var(--c-completed-bg); }
    .query-results .task.completed .task-text { color: var(--c-text-muted); }
    .drawer-body .task { background: var(--c-task-bg); margin-bottom: 10px; }
    .drawer-body .task.completed { background: var(--c-completed-bg); }
    .drawer-body .task.completed .task-text { color: var(--c-text-muted); }
    .query-results .query-empty { color: #888; font-style: italic; padding: 15px 0; }
    .query-results .query-group { margin-bottom: 20px; }
    .query-results .query-group-title { font-size: 1em; color: var(--c-secondary); margin-bottom: 10px; }
    .drawer-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 100; }
    .drawer-overlay.open { display: block; }
    .drawer { display: none; position: fixed; left: 0; right: 0; bottom: 0; max-height: 70vh; background: white; border-radius: 16px 16px 0 0; box-shadow: 0 -4px 20px rgba(0,0,0,0.15); z-index: 101; flex-direction: column; }
    .drawer.open { display: flex; }
    .drawer-handle { width: 36px; height: 4px; background: #ccc; border-radius: 2px; margin: 10px auto 8px; }
    .drawer-title { padding: 0 20px 12px; font-size: 1.1em; color: var(--c-secondary); font-weight: 600; }
    .drawer-body { overflow: auto; padding: 0 20px 24px; flex: 1; min-height: 0; }

    .edit-drawer-body { display: flex; flex-direction: column; gap: 14px; }
    .edit-drawer-input { padding: 12px 14px; border: 2px solid var(--c-edit-drawer-border); border-radius: 10px; font-size: 16px; width: 100%; box-sizing: border-box; color: #333; outline: none; transition: border-color 0.2s; }
    .edit-drawer-input:focus { border-color: var(--c-edit-drawer-focus); }
    .edit-drawer-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 4px; }
    .edit-drawer-actions .btn-ed-cancel { background: #f0f0f0; color: #555; border: none; border-radius: 8px; padding: 10px 20px; cursor: pointer; font-size: 15px; }
    .edit-drawer-actions .btn-ed-save { background: var(--c-edit-drawer-save); color: white; border: none; border-radius: 8px; padding: 10px 24px; cursor: pointer; font-size: 15px; font-weight: 600; }

    .import-section { margin-top: 30px; padding-top: 20px; border-top: 1px solid #e0e0e0; }
    .import-row { display: flex; gap: 10px; align-items: center; margin-bottom: 15px; flex-wrap: wrap; }
    .import-row input[type="file"] { flex: 1; min-width: 150px; padding: 8px; }
    .import-result { padding: 15px; background: #f8f9ff; border-radius: 10px; font-size: 0.95em; line-height: 1.6; }
    .import-result.error { background: #ffebee; color: #c62828; }
    .import-result.success { background: #e8f5e9; color: #2e7d32; }

    .edit-fields select, .edit-drawer-input[id="edit-drawer-category"] {
      padding: 10px; border: 2px solid var(--c-primary); border-radius: 10px; font-size: 1em; background: white; color: #333; cursor: pointer;
    }
    .edit-category-select {
      padding: 10px; border: 2px solid var(--c-primary); border-radius: 10px; font-size: 1em; background: white; color: #333; width: 100%; cursor: pointer;
    }

    .done-category-group { margin-bottom: 16px; }
    .done-category-group:last-child { margin-bottom: 0; }
    .done-category-header {
      display: flex; align-items: center; gap: 8px; font-size: 0.9em; font-weight: 600;
      color: var(--c-secondary); margin-bottom: 8px; padding-left: 2px; text-transform: capitalize;
    }
    .done-category-header.empty { color: #bbb; }
    .done-category-bar { width: 4px; height: 16px; border-radius: 2px; flex-shrink: 0; }

    @keyframes fadeIn { from { opacity: 0; transform: translateY(-6px); } to { opacity: 1; transform: translateY(0); } }
    .task-fade-in { animation: fadeIn 0.25s ease; }

    /* 设置按钮 */
    header { position: relative; }
    .btn-settings {
      position: absolute; right: 0; top: 8px;
      background: none; border: none; font-size: 1.6em; cursor: pointer;
      color: var(--c-text-muted); transition: color 0.2s; padding: 4px 8px; line-height: 1;
    }
    .btn-settings:hover { color: var(--c-primary); }

    /* 设置面板（右侧抽屉） */
    .settings-drawer {
      display: none; position: fixed; right: 0; top: 0; bottom: 0;
      width: 380px; max-width: 100vw; background: white; z-index: 102;
      box-shadow: -4px 0 20px rgba(0,0,0,0.15); flex-direction: column;
    }
    .settings-drawer.open { display: flex; animation: settingsSlide 0.25s ease; }
    @keyframes settingsSlide { from { transform: translateX(100%); } to { transform: translateX(0); } }
    .settings-header {
      display: flex; justify-content: space-between; align-items: center;
      padding: 20px; border-bottom: 1px solid #e0e0e0;
    }
    .settings-title { font-size: 1.2em; font-weight: 700; color: var(--c-secondary); }
    .settings-close-btn { background: none; border: none; font-size: 1.8em; cursor: pointer; color: #999; line-height: 1; padding: 0 4px; }
    .settings-body { flex: 1; overflow-y: auto; padding: 20px; }
    .settings-footer {
      display: flex; gap: 10px; padding: 16px 20px; border-top: 1px solid #e0e0e0;
    }
    .btn-settings-action {
      flex: 1; padding: 10px; border: none; border-radius: 8px; cursor: pointer;
      font-size: 0.9em; font-weight: 600; transition: filter 0.2s;
    }
    .btn-settings-action:hover { filter: brightness(0.9); }
    .btn-reset { background: #f0f0f0; color: #555; }
    .btn-apply { background: var(--c-primary); color: white; }

    .settings-section { margin-bottom: 20px; }
    .settings-section-title { font-size: 0.85em; font-weight: 700; color: var(--c-secondary); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 10px; }
    .settings-field { margin-bottom: 12px; }
    .settings-field label { display: block; font-size: 0.85em; color: var(--c-text-muted); margin-bottom: 4px; }
    .settings-field input[type="text"],
    .settings-field input[type="url"] {
      width: 100%; padding: 8px 10px; border: 2px solid #e0e0e0; border-radius: 8px;
      font-size: 0.9em; outline: none; transition: border-color 0.2s;
    }
    .settings-field input:focus { border-color: var(--c-primary); }
    .settings-field input[type="color"] {
      width: 36px; height: 28px; border: 2px solid #e0e0e0; border-radius: 6px;
      cursor: pointer; padding: 1px; vertical-align: middle;
    }
    .settings-cat-row {
      display: flex; gap: 8px; align-items: center; margin-bottom: 8px;
      padding: 8px; background: #f8f9ff; border-radius: 8px;
    }
    .settings-cat-row input[type="text"] { flex: 1; padding: 6px 8px; border: 1px solid #ddd; border-radius: 6px; font-size: 0.85em; }
    .settings-cat-row input[type="color"] { width: 30px; height: 26px; border: 1px solid #ddd; border-radius: 4px; padding: 1px; cursor: pointer; }
    .settings-cat-row .btn-cat-remove {
      background: none; border: none; color: var(--c-danger); cursor: pointer; font-size: 1.1em; padding: 2px 6px; flex-shrink: 0;
    }
    .btn-cat-add {
      background: none; border: 2px dashed #ccc; border-radius: 8px; padding: 8px; width: 100%;
      cursor: pointer; color: #999; font-size: 0.85em; transition: border-color 0.2s, color 0.2s;
    }
    .btn-cat-add:hover { border-color: var(--c-primary); color: var(--c-primary); }

    @media (max-width: 768px) {
      body { padding: 20px; }
      .app-card { padding: 20px; }
      .title { font-size: 2em; }
      .stats-grid { grid-template-columns: 1fr; }
      .input-row { flex-direction: column; flex-wrap: wrap; }
      .input-row input { min-width: 0; width: 100%; }
      .btn-add { width: 100%; }
      .task { overflow: hidden; padding: 0; gap: 0; }
      .task-inner {
        display: flex; align-items: center; justify-content: space-between; gap: 8px;
        padding: 12px 15px; width: 100%; box-sizing: border-box;
        background: var(--c-task-bg); position: relative; z-index: 1; transition: transform 0.3s ease;
      }
      .task.completed .task-inner { background: var(--c-completed-bg); }
      .done-list .task .task-inner { background: var(--c-completed-bg); }
      .task > .btn-delete {
        position: absolute; right: 0; top: 0; width: 80px; height: 100%;
        border-radius: 0; font-size: 0.85em; z-index: 0; padding: 0;
        display: flex; align-items: center; justify-content: center;
      }
      .task > .btn-edit-swipe {
        display: flex; position: absolute; left: 0; top: 0; width: 80px; height: 100%;
        background: var(--c-swipe-edit); color: white; border: none; border-radius: 0;
        font-size: 0.85em; z-index: 0; padding: 0; align-items: center; justify-content: center; cursor: pointer;
      }
      .task-inner .actions { flex-direction: column; gap: 4px; flex-shrink: 0; align-items: stretch; }
      .task-inner .actions button { padding: 5px 10px; font-size: 0.78em; white-space: nowrap; }
      .task-inner .actions { display: none; }
      .query-row { flex-direction: column; align-items: stretch; }
      .query-row input[type="date"] { width: 100%; }
      .query-row #btn-query { width: 100%; }
      .calendar-view-wrap { flex-direction: column; }
      .query-results-wrap { display: none; }
      .heatmap-box { width: 100%; box-sizing: border-box; }
      .heatmap-row { width: 100%; display: flex; gap: 4px; }
      .heatmap-cell { flex: 1 1 0; min-width: 0; aspect-ratio: 1; height: auto; border-radius: 3px; }
      .drawer.open { animation: drawerSlide 0.25s ease; }
      @keyframes drawerSlide { from { transform: translateY(100%); } to { transform: translateY(0); } }
      .import-row { flex-direction: column; align-items: stretch; }
      .import-row input[type="file"] { width: 100%; }
      .import-row #btn-import { width: 100%; }
      .input-row input, .edit-fields input[type="text"], .edit-fields input[type="date"], .query-row input[type="date"] { font-size: 16px; }
      .settings-drawer { width: 100vw; }
    }
    @media (max-width: 380px) {
      body { padding: 12px; }
      .title { font-size: 1.1rem; }
      .app-card { padding: 16px; }
      .input-row input, .btn-add { padding: 10px; }
      .task-inner { padding: 10px 12px; }
    }
    .sr-only{position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;border:0}
  </style>
</head>
<body>
  <div class="container">
    <section class="app-card">
      <header>
        <h1 class="title" id="appTitle"></h1>
        <p class="subtitle" id="appSubtitle"></p>
        <button id="btn-settings" class="btn-settings" aria-label="Settings">&#9881;</button>
      </header>

      <div class="quote" id="motivationalQuote"></div>

      <div class="stats">
        <h3 style="margin:0 0 5px 0;font-size:1.1em" id="statsHeading"></h3>
        <div class="stats-grid">
          <div class="stat-item">
            <div class="stat-number" id="statTotal">0</div>
            <div class="stat-label" id="statTodayLabel"></div>
          </div>
          <div class="stat-item">
            <div class="stat-number" id="statCompleted">0</div>
            <div class="stat-label" id="statCompletedLabel"></div>
          </div>
          <div class="stat-item">
            <div class="stat-number" id="statRate">0%</div>
            <div class="stat-label" id="statRateLabel"></div>
          </div>
        </div>
      </div>

      <h2 class="section-title" id="todayTasksTitle"></h2>

      <div class="category-tabs" id="category-tabs"></div>

      <div class="input-row">
        <label for="task-input" class="sr-only">New task</label>
        <input id="task-input" type="text">
        <button class="btn-add" id="btn-add" aria-label="Add task"></button>
      </div>

      <ul class="task-list" aria-live="polite"></ul>

      <div class="done-section">
        <h2 class="section-title" id="completedTitle"></h2>
        <div id="done-list" aria-live="polite"></div>
      </div>

      <div class="query-section">
        <h2 class="section-title" id="queryTitle"></h2>
        <div class="query-row">
          <label for="query-start" id="queryStartLabel"></label>
          <input id="query-start" type="date">
          <label for="query-end" id="queryEndLabel"></label>
          <input id="query-end" type="date">
          <button class="btn-add" id="btn-query"></button>
        </div>
        <div class="calendar-view-wrap">
          <div class="heatmap-box" id="calendar-heatmap" aria-label="年度任务热力图"></div>
          <div class="query-results-wrap">
            <div id="query-results" class="query-results"></div>
          </div>
        </div>
        <div class="drawer-overlay" id="drawer-overlay" aria-hidden="true"></div>
        <div class="drawer drawer-bottom" id="day-drawer" aria-hidden="true">
          <div class="drawer-handle"></div>
          <div class="drawer-title" id="drawer-title"></div>
          <div class="drawer-body" id="drawer-tasks"></div>
        </div>
      </div>

      <!-- 编辑任务底部弹窗（移动端） -->
      <div class="drawer-overlay" id="edit-drawer-overlay" aria-hidden="true"></div>
      <div class="drawer drawer-bottom" id="edit-drawer" aria-hidden="true">
        <div class="drawer-handle"></div>
        <div class="drawer-title" id="editDrawerTitle"></div>
        <div class="drawer-body edit-drawer-body">
          <input type="text" id="edit-drawer-text" class="edit-drawer-input">
          <input type="date" id="edit-drawer-date" class="edit-drawer-input">
          <select id="edit-drawer-category" class="edit-drawer-input"></select>
          <div class="edit-drawer-actions">
            <button type="button" id="edit-drawer-cancel" class="btn-ed-cancel"></button>
            <button type="button" id="edit-drawer-save" class="btn-ed-save"></button>
          </div>
        </div>
      </div>

      <div class="import-section">
        <h2 class="section-title" id="importTitle"></h2>
        <div class="import-row">
          <input id="import-file" type="file" accept=".docx">
          <button class="btn-add" id="btn-import"></button>
        </div>
        <div id="import-result" class="import-result"></div>
      </div>
      <!-- 设置面板 -->
      <div class="drawer-overlay" id="settings-overlay" aria-hidden="true"></div>
      <div class="settings-drawer" id="settings-drawer" aria-hidden="true">
        <div class="settings-header">
          <span class="settings-title">Settings</span>
          <button id="settings-close" class="settings-close-btn">&times;</button>
        </div>
        <div class="settings-body" id="settings-body"></div>
        <div class="settings-footer">
          <button id="settings-reset" class="btn-settings-action btn-reset">Reset to Default</button>
          <button id="settings-save" class="btn-settings-action btn-apply">Save &amp; Apply</button>
        </div>
      </div>
    </section>
  </div>

  <!-- 依赖顺序：config（纯数据）→ store（状态）→ api（网络层）→ ui（DOM/事件） -->
  <script src="config.js"></script>
  <script src="store.js"></script>
  <script src="api.js"></script>
  <script src="ui.js"></script>
</body>
</html>
