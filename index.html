<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Willah's Done List</title>
  <meta name="description" content="Dream big, act daily, get things done.">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 20px;
      color: #333;
      -webkit-font-smoothing: antialiased;
    }

    .container {
      max-width: 900px;
      margin: 0 auto;
    }

    .app-card {
      background: white;
      border-radius: 20px;
      padding: 30px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    }

    .title {
      color: #667eea;
      text-align: center;
      margin-bottom: 10px;
      font-size: 2.5em;
    }
    .subtitle {
      text-align: center;
      color: #666;
      margin-bottom: 30px;
      font-style: italic;
    }

    .quote {
      background: #f0f4ff;
      padding: 15px;
      border-left: 4px solid #667eea;
      margin-bottom: 30px;
      border-radius: 5px;
      font-style: italic;
      color: #555;
    }

    .stats {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      padding: 20px;
      border-radius: 15px;
      text-align: center;
      margin-bottom: 30px;
    }
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 20px;
      margin-top: 15px;
    }
    .stat-item {
      background: rgba(255,255,255,0.2);
      padding: 15px;
      border-radius: 10px;
    }
    .stat-number { font-size: 2em; font-weight: bold; }
    .stat-label { font-size: 0.9em; opacity: 0.9; }

    .input-row {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
      align-items: center;
    }
    .input-row input {
      flex: 1;
      padding: 12px;
      border: 2px solid #e0e0e0;
      border-radius: 10px;
      font-size: 1em;
      transition: border-color 0.3s;
    }
    .input-row input:focus {
      outline: none;
      border-color: #667eea;
    }
    .btn-add {
      padding: 12px 24px;
      background: #667eea;
      color: white;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      font-size: 1em;
      transition: background 0.3s;
    }
    .btn-add:hover { background: #5568d3; }

    .task-list {
      list-style: none;
      padding: 0;
      margin: 0;
    }
    .task {
      background: #f8f9ff;
      padding: 15px;
      border-radius: 10px;
      margin-bottom: 10px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 15px;
      transition: transform 0.2s;
      border-left: 4px solid #ffa726;
    }
    .task:hover { transform: translateX(5px); }
    .task.completed {
      border-left: 4px solid #66bb6a;
      background: #f1f8f4;
    }
    .task-text { font-size: 1em; line-height: 1.5; }
    .task.completed .task-text {
      text-decoration: line-through;
      color: #888;
    }

    .actions { display: flex; gap: 10px; flex-wrap: wrap; }
    .actions button {
      padding: 6px 12px;
      font-size: 0.9em;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      transition: background 0.3s;
    }
    .btn-complete { background: #66bb6a; color: white; }
    .btn-complete:hover { background: #57a35a; }
    .btn-delete { background: #ef5350; color: white; }
    .btn-delete:hover { background: #e03e3a; }
    .btn-edit { background: #42a5f5; color: white; }
    .btn-edit:hover { background: #1e88e5; }
    .btn-save { background: #66bb6a; color: white; }
    .btn-cancel { background: #b0bec5; color: #263238; }
    .btn-undo { background: #ffa726; color: white; }
    .btn-undo:hover { background: #fb8c00; }

    .task-date { font-size: 0.85em; color: #666; margin-top: 4px; }
    .task.completed .task-date { color: #888; }
    .task-content { flex: 1; min-width: 0; }

    .section-title { color: #764ba2; font-size: 1.2em; margin-bottom: 15px; }
    .done-section { margin-top: 30px; padding-top: 20px; border-top: 1px solid #e0e0e0; }
    .done-list { list-style: none; padding: 0; margin: 0; }
    .done-list .task { border-left-color: #66bb6a; background: #f1f8f4; }
    .done-list .task-text { text-decoration: line-through; color: #888; }
    .edit-fields { display: flex; flex-direction: column; gap: 8px; margin-bottom: 8px; }
    .edit-fields input[type="text"], .edit-fields input[type="date"] { padding: 10px; border: 2px solid #667eea; border-radius: 10px; font-size: 1em; }

    .query-section { margin-top: 30px; padding-top: 20px; border-top: 1px solid #e0e0e0; }
    .query-row { display: flex; gap: 10px; align-items: center; margin-bottom: 15px; flex-wrap: wrap; }
    .query-row label { font-size: 0.9em; color: #666; }
    .query-row input[type="date"] { padding: 10px; border: 2px solid #e0e0e0; border-radius: 10px; font-size: 1em; }
    .query-results { min-height: 20px; }
    .query-results .task { margin-bottom: 10px; }
    .query-results .query-empty { color: #888; font-style: italic; padding: 15px 0; }
    .query-results .query-group { margin-bottom: 20px; }
    .query-results .query-group-title { font-size: 1em; color: #764ba2; margin-bottom: 10px; }

    /* 手机端：与参考 HTML 一致 */
    @media (max-width: 768px) {
      body { padding: 20px; }
      .app-card { padding: 20px; }
      .title { font-size: 2em; }
      .stats-grid { grid-template-columns: 1fr; }
      .input-row {
        flex-direction: column;
        flex-wrap: wrap;
      }
      .input-row input { min-width: 0; width: 100%; }
      .btn-add { width: 100%; }
      .task { flex-direction: column; align-items: flex-start; }
      .actions { width: 100%; }
      .query-row { flex-direction: column; align-items: stretch; }
      .query-row input[type="date"] { width: 100%; }
      .query-row #btn-query { width: 100%; }
    }
    @media (max-width: 380px) {
      body { padding: 12px; }
      .title { font-size: 1.1rem; }
      .app-card { padding: 16px; }
      .input-row input, .btn-add { padding: 10px; }
      .task { padding: 10px; }
    }
  </style>
</head>
<body>
  <div class="container">
    <section class="app-card">
      <header>
        <h1 class="title">Willah's Done List</h1>
        <p class="subtitle">Dream big, act daily, get things done.</p>
      </header>

      <div class="quote" id="motivationalQuote">"The secret of getting ahead is getting started." - Mark Twain</div>

      <div class="stats">
        <h3 style="margin:0 0 5px 0;font-size:1.1em">📊 Task Overview</h3>
        <div class="stats-grid">
          <div class="stat-item">
            <div class="stat-number" id="statTotal">0</div>
            <div class="stat-label">Today's Tasks</div>
          </div>
          <div class="stat-item">
            <div class="stat-number" id="statCompleted">0</div>
            <div class="stat-label">2026's Completed Tasks</div>
          </div>
          <div class="stat-item">
            <div class="stat-number" id="statRate">0%</div>
            <div class="stat-label">2026's Execution</div>
          </div>
        </div>
      </div>

      <h2 class="section-title">⚡ Today's Tasks</h2>
      <div class="input-row">
        <label for="task-input" class="sr-only">New task</label>
        <input id="task-input" type="text" placeholder="Add a new task">
        <button class="btn-add" aria-label="Add task">Add</button>
      </div>

      <ul class="task-list" aria-live="polite"></ul>

      <div class="done-section">
        <h2 class="section-title">✅ Today's Completed Tasks</h2>
        <ul class="done-list" id="done-list" aria-live="polite"></ul>
      </div>

      <div class="query-section">
        <h2 class="section-title">🔍 任务查询</h2>
        <div class="query-row">
          <label for="query-start">开始日期</label>
          <input id="query-start" type="date">
          <label for="query-end">结束日期</label>
          <input id="query-end" type="date">
          <button class="btn-add" id="btn-query">查询</button>
        </div>
        <div id="query-results" class="query-results"></div>
      </div>
    </section>
  </div>

  <!-- 屏幕阅读器隐藏类 -->
  <style>
    .sr-only{position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;border:0}
  </style>

  <!-- 以下为原生 JavaScript：实现“添加任务”功能（含中文注释） -->
  <script>
    // 获取页面上的关键元素
    const taskInput = document.getElementById('task-input'); // 输入框
    const addButton = document.querySelector('.btn-add'); // 添加按钮
    const taskList = document.querySelector('.task-list'); // 任务列表容器

    function todayStr() { return new Date().toISOString().slice(0, 10); }
    function isCompletedToday(completedAt) {
      if (!completedAt) return true;
      return completedAt.slice(0, 10) === todayStr();
    }

    function createTaskElement(text, completed, createdAt, completedAt, id) {
      if (id == null) id = Date.now();
      if (!createdAt) createdAt = todayStr();
      const li = document.createElement('li');
      li.className = 'task';
      li.dataset.id = String(id);
      li.dataset.createdAt = createdAt;
      li.dataset.completedAt = completedAt || '';
      if (completed) li.classList.add('completed');

      const content = document.createElement('div');
      content.className = 'task-content';
      const span = document.createElement('span');
      span.className = 'task-text';
      span.textContent = text;
      const dateSpan = document.createElement('div');
      dateSpan.className = 'task-date';
      dateSpan.textContent = createdAt;
      content.appendChild(span);
      content.appendChild(dateSpan);

      const actions = document.createElement('div');
      actions.className = 'actions';
      const completeBtn = document.createElement('button');
      completeBtn.type = 'button';
      completeBtn.className = 'btn-complete';
      completeBtn.textContent = completed ? 'Undo' : 'Done';
      const editBtn = document.createElement('button');
      editBtn.type = 'button';
      editBtn.className = 'btn-edit';
      editBtn.textContent = 'Edit';
      const deleteBtn = document.createElement('button');
      deleteBtn.type = 'button';
      deleteBtn.className = 'btn-delete';
      deleteBtn.textContent = 'Delete';
      actions.appendChild(completeBtn);
      actions.appendChild(editBtn);
      actions.appendChild(deleteBtn);
      li.appendChild(content);
      li.appendChild(actions);
      return li;
    }

    /**
     * 添加任务：读取输入、校验非空、创建元素并追加到列表、清空输入
     */
    async function addTask() {
      const text = taskInput.value.trim();
      if (!text) return;
      const createdAt = todayStr();
      const id = Date.now();
      const taskItem = createTaskElement(text, false, createdAt, null, id);
      taskList.appendChild(taskItem);
      // 清空并聚焦输入框，方便继续添加
      taskInput.value = '';
      taskInput.focus();

      // 新增任务后保存当前列表到本地或远端
      if (API_BASE) await saveTasksToServer().catch(err => console.warn('Save to server failed:', err));
      else saveTasks();
      updateStats();
    }

    // 点击按钮触发添加
    addButton.addEventListener('click', addTask);

    // 按回车也触发添加，增强体验
    taskInput.addEventListener('keydown', function (e) {
      if (e.key === 'Enter') addTask();
    });

    /*
      使用事件委托统一处理任务列表中的“完成”和“删除”按钮。
      优点：
        - 对静态存在的任务按钮有效（页面加载时已在 DOM 中）
        - 对之后动态添加的任务也有效（无需为每个新按钮重复绑定事件）
        - 保持代码简洁，避免重复绑定导致的多次触发问题
    */
    taskList.addEventListener('click', async function (e) {
      const target = e.target;

      // 如果点击的是删除按钮，则只移除对应的任务项
      if (target.classList.contains('btn-delete')) {
        const li = target.closest('li.task');
        if (li) taskList.removeChild(li);
        if (API_BASE) await saveTasksToServer().catch(err => console.warn('Save to server failed:', err));
        else saveTasks();
        updateStats();
        return;
      }

      // 点击完成：从主列表移到「当天完成」模块
      if (target.classList.contains('btn-complete')) {
        const li = target.closest('li.task');
        const doneList = document.getElementById('done-list');
        if (li && doneList && taskList.contains(li)) {
          li.dataset.completedAt = todayStr();
          li.classList.add('completed');
          const content = li.querySelector('.task-content');
          if (content) {
            const textEl = content.querySelector('.task-text');
            if (textEl) textEl.style.textDecoration = 'line-through';
          }
          const actions = li.querySelector('.actions');
          if (actions) {
            actions.innerHTML = '';
            const undoBtn = document.createElement('button');
            undoBtn.type = 'button';
            undoBtn.className = 'btn-undo';
            undoBtn.textContent = 'Undo';
            const editBtn = document.createElement('button');
            editBtn.type = 'button';
            editBtn.className = 'btn-edit';
            editBtn.textContent = 'Edit';
            const deleteBtn = document.createElement('button');
            deleteBtn.type = 'button';
            deleteBtn.className = 'btn-delete';
            deleteBtn.textContent = 'Delete';
            actions.appendChild(undoBtn);
            actions.appendChild(editBtn);
            actions.appendChild(deleteBtn);
          }
          taskList.removeChild(li);
          doneList.appendChild(li);
          if (API_BASE) await saveTasksToServer().catch(err => console.warn('Save to server failed:', err));
          else saveTasks();
          updateStats();
        }
      }

      if (target.classList.contains('btn-edit')) {
        const li = target.closest('li.task');
        if (li) startEdit(li);
      }
    });

    function startEdit(li, opts) {
      const textEl = li.querySelector('.task-text');
      const currentText = textEl ? textEl.textContent : '';
      const currentDate = li.dataset.createdAt || todayStr();
      const actions = li.querySelector('.actions');
      const content = li.querySelector('.task-content');
      if (!content || !actions) return;
      const onBeforeSave = opts?.onBeforeSave;
      const wrap = document.createElement('div');
      wrap.className = 'edit-fields';
      const inputText = document.createElement('input');
      inputText.type = 'text';
      inputText.value = currentText;
      inputText.placeholder = 'Task content';
      const inputDate = document.createElement('input');
      inputDate.type = 'date';
      inputDate.value = currentDate;
      const btnWrap = document.createElement('div');
      btnWrap.className = 'actions';
      const saveBtn = document.createElement('button');
      saveBtn.type = 'button';
      saveBtn.className = 'btn-save';
      saveBtn.textContent = 'Save';
      const cancelBtn = document.createElement('button');
      cancelBtn.type = 'button';
      cancelBtn.className = 'btn-cancel';
      cancelBtn.textContent = 'Cancel';
      saveBtn.onclick = async function() {
        const newText = inputText.value.trim();
        if (!newText) return;
        li.dataset.createdAt = inputDate.value || todayStr();
        content.style.display = '';
        content.querySelector('.task-text').textContent = newText;
        content.querySelector('.task-date').textContent = li.dataset.createdAt;
        li.removeChild(wrap);
        li.appendChild(actions);
        if (onBeforeSave) onBeforeSave(li);
        if (API_BASE) await saveTasksToServer().catch(() => {});
        else saveTasks();
        updateStats();
      };
      cancelBtn.onclick = function() {
        content.style.display = '';
        li.removeChild(wrap);
        li.appendChild(actions);
      };
      btnWrap.appendChild(saveBtn);
      btnWrap.appendChild(cancelBtn);
      wrap.appendChild(inputText);
      wrap.appendChild(inputDate);
      wrap.appendChild(btnWrap);
      content.style.display = 'none';
      li.appendChild(wrap);
      li.removeChild(actions);
      inputText.focus();
    }

    const doneListEl = document.getElementById('done-list');
    if (doneListEl) {
      doneListEl.addEventListener('click', async function (e) {
        const target = e.target;
        const li = target.closest('li.task');
        if (!li) return;
        if (target.classList.contains('btn-undo')) {
          const id = li.dataset.id;
          const text = li.querySelector('.task-text')?.textContent || '';
          const createdAt = li.dataset.createdAt || todayStr();
          doneListEl.removeChild(li);
          const newLi = createTaskElement(text, false, createdAt, null, id);
          taskList.appendChild(newLi);
          if (API_BASE) await saveTasksToServer().catch(() => {});
          else saveTasks();
          updateStats();
        } else if (target.classList.contains('btn-edit')) {
          startEdit(li);
        } else if (target.classList.contains('btn-delete')) {
          doneListEl.removeChild(li);
          if (API_BASE) await saveTasksToServer().catch(() => {});
          else saveTasks();
          updateStats();
        }
      });
    }

    function saveTasks() {
      mergeTodayIntoCache();
      try {
        localStorage.setItem('todoList', JSON.stringify(allTasksCache));
      } catch (err) {
        // localStorage 写入可能在隐私模式或存储被禁用时失败，这里静默处理
        console.warn('Could not save to localStorage:', err);
      }
    }

    function mergeTodayIntoCache() {
      const today = todayStr();
      function isTodayTask(t) {
        return t.createdAt === today || (t.completed && t.completedAt && t.completedAt.slice(0, 10) === today);
      }
      const todayFromDom = getTasksSnapshot();
      const rest = allTasksCache.filter(t => !isTodayTask(t));
      allTasksCache = rest.concat(todayFromDom);
    }

    /**
     * 从 localStorage 读取任务并初始化列表
     * 如果没有已保存的数据，则初始化为空列表（符合需求）
     */
    function loadTasks() {
      try {
        const raw = localStorage.getItem('todoList');
        if (!raw) {
          allTasksCache = [];
          taskList.innerHTML = '';
          updateStats();
          restoreAndRunQuery();
          return;
        }
        const tasks = JSON.parse(raw);
        if (!Array.isArray(tasks)) throw new Error('格式不正确');

        allTasksCache = tasks;
        applyTasks(tasks);
        restoreAndRunQuery();
      } catch (err) {
        console.warn('Failed to load from localStorage, starting with empty list:', err);
        allTasksCache = [];
        taskList.innerHTML = '';
        const dl = document.getElementById('done-list');
        if (dl) dl.innerHTML = '';
        restoreAndRunQuery();
      }
    }

    const API_BASE = (typeof location !== 'undefined' && (location.hostname === 'localhost' || location.hostname === '127.0.0.1'))
      ? (location.origin || '') : 'https://willah.zeabur.app'; // 本地用当前 origin，否则用 zeabur
    const SYNC_INTERVAL_MS = 3000; // 轮询间隔，多端实时更新
    let syncTimer = null;
    let allTasksCache = []; // 全量任务缓存，用于查询与合并保存

    (async function init() {
      if (API_BASE) {
        try {
          await loadTasksFromServer();
          syncTimer = setInterval(pollAndMergeTasks, SYNC_INTERVAL_MS);
          return;
        } catch (err) {
          console.warn('Load from server failed, falling back to localStorage:', err);
        }
      }
      loadTasks();
    })();

    async function loadTasksFromServer() {
      const res = await fetch(API_BASE + '/api/storage?key=todoList');
      if (res.status === 404) {
        allTasksCache = [];
        taskList.innerHTML = '';
        const dl = document.getElementById('done-list');
        if (dl) dl.innerHTML = '';
        updateStats();
        restoreAndRunQuery();
        return;
      }
      if (!res.ok) throw new Error('fetch failed');
      const data = await res.json();
      const tasks = data.value;
      if (!Array.isArray(tasks)) {
        taskList.innerHTML = '';
        const dl = document.getElementById('done-list');
        if (dl) dl.innerHTML = '';
        updateStats();
        return;
      }
      allTasksCache = tasks;
      applyTasks(tasks);
      restoreAndRunQuery();
    }

    async function saveTasksToServer() {
      mergeTodayIntoCache();
      const res = await fetch(API_BASE + '/api/storage', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ key: 'todoList', value: allTasksCache })
      });
      if (!res.ok) throw new Error('save failed');
    }

    function getTasksSnapshot() {
      const fromMain = Array.from(taskList.querySelectorAll('li.task')).map(li => snapshotOne(li, false));
      const doneList = document.getElementById('done-list');
      const fromDone = doneList ? Array.from(doneList.querySelectorAll('li.task')).map(li => snapshotOne(li, true)) : [];
      return fromMain.concat(fromDone);
    }
    function snapshotOne(li, completed) {
      const textEl = li.querySelector('.task-text');
      let createdAt = li.dataset.createdAt;
      let completedAt = li.dataset.completedAt || null;
      if (!createdAt) createdAt = todayStr();
      return {
        id: li.dataset.id ? Number(li.dataset.id) : Date.now(),
        text: textEl ? textEl.textContent : '',
        completed,
        createdAt,
        completedAt: completedAt || null
      };
    }

    function updateStats() {
      const tasks = getTasksSnapshot();
      const total = tasks.length;
      const completed = tasks.filter(t => t.completed).length;
      const rate = total ? Math.round(completed / total * 100) : 0;
      const elTotal = document.getElementById('statTotal');
      const elCompleted = document.getElementById('statCompleted');
      const elRate = document.getElementById('statRate');
      if (elTotal) elTotal.textContent = total;
      if (elCompleted) elCompleted.textContent = completed;
      if (elRate) elRate.textContent = rate + '%';
    }

    function applyTasks(tasks) {
      if (!Array.isArray(tasks)) return;
      const doneList = document.getElementById('done-list');
      taskList.innerHTML = '';
      if (doneList) doneList.innerHTML = '';
      tasks.forEach((t, i) => {
        const id = t.id != null ? t.id : Date.now() + i;
        const createdAt = t.createdAt || todayStr();
        const completedAt = t.completed ? (t.completedAt || todayStr()) : null;
        const completed = Boolean(t.completed);
        const li = createTaskElement(t.text, completed, createdAt, completedAt, id);
        if (completed && doneList && isCompletedToday(completedAt)) {
          li.classList.add('completed');
          li.dataset.completedAt = completedAt;
          const content = li.querySelector('.task-content');
          if (content) {
            const textEl = content.querySelector('.task-text');
            if (textEl) textEl.style.textDecoration = 'line-through';
          }
          const actions = li.querySelector('.actions');
          if (actions) {
            actions.innerHTML = '';
            const undoBtn = document.createElement('button');
            undoBtn.type = 'button';
            undoBtn.className = 'btn-undo';
            undoBtn.textContent = 'Undo';
            const editBtn = document.createElement('button');
            editBtn.type = 'button';
            editBtn.className = 'btn-edit';
            editBtn.textContent = 'Edit';
            const deleteBtn = document.createElement('button');
            deleteBtn.type = 'button';
            deleteBtn.className = 'btn-delete';
            deleteBtn.textContent = 'Delete';
            actions.appendChild(undoBtn);
            actions.appendChild(editBtn);
            actions.appendChild(deleteBtn);
          }
          doneList.appendChild(li);
        } else if (!completed) {
          taskList.appendChild(li);
        }
      });
      updateStats();
    }

    const QUERY_STORAGE_KEY = 'taskQueryState';

    function runQuery(startDate, endDate) {
      const start = startDate || '';
      const end = endDate || '';
      const today = todayStr();
      const tasks = allTasksCache.filter(t => {
        const d = t.createdAt || '';
        if (d >= today) return false;
        if (!start && !end) return true;
        if (start && end) return d >= start && d <= end;
        if (start) return d >= start;
        return d <= end;
      });
      renderQueryResults(tasks);
      try {
        sessionStorage.setItem(QUERY_STORAGE_KEY, JSON.stringify({ start, end, tasks }));
      } catch (e) {}
    }

    function renderQueryResults(tasks) {
      const container = document.getElementById('query-results');
      if (!container) return;
      container.innerHTML = '';
      if (tasks.length === 0) {
        container.innerHTML = '<p class="query-empty">暂无符合条件的任务</p>';
        return;
      }
      const completed = tasks.filter(t => t.completed);
      const uncompleted = tasks.filter(t => !t.completed);
      if (uncompleted.length > 0) {
        const g = document.createElement('div');
        g.className = 'query-group';
        g.innerHTML = '<div class="query-group-title">未完成任务</div>';
        const ul = document.createElement('ul');
        ul.className = 'task-list';
        uncompleted.forEach(t => ul.appendChild(createQueryTaskElement(t)));
        g.appendChild(ul);
        container.appendChild(g);
      }
      if (completed.length > 0) {
        const g = document.createElement('div');
        g.className = 'query-group';
        g.innerHTML = '<div class="query-group-title">已完成任务</div>';
        const ul = document.createElement('ul');
        ul.className = 'task-list';
        completed.forEach(t => ul.appendChild(createQueryTaskElement(t, true)));
        g.appendChild(ul);
        container.appendChild(g);
      }
    }

    function createQueryTaskElement(t, isCompleted) {
      const li = createTaskElement(t.text, isCompleted, t.createdAt, t.completedAt, t.id);
      li.dataset.id = String(t.id);
      const actions = li.querySelector('.actions');
      if (!actions) return li;
      actions.innerHTML = '';
      if (isCompleted) {
        const undoBtn = document.createElement('button');
        undoBtn.type = 'button';
        undoBtn.className = 'btn-undo';
        undoBtn.textContent = 'Undo';
        actions.appendChild(undoBtn);
        undoBtn.onclick = () => undoQueryTask(li);
      } else {
        const doneBtn = document.createElement('button');
        doneBtn.type = 'button';
        doneBtn.className = 'btn-complete';
        doneBtn.textContent = 'Done';
        actions.appendChild(doneBtn);
        doneBtn.onclick = () => completeQueryTask(li);
      }
      const editBtn = document.createElement('button');
      editBtn.type = 'button';
      editBtn.className = 'btn-edit';
      editBtn.textContent = 'Edit';
      const deleteBtn = document.createElement('button');
      deleteBtn.type = 'button';
      deleteBtn.className = 'btn-delete';
      deleteBtn.textContent = 'Delete';
      actions.appendChild(editBtn);
      actions.appendChild(deleteBtn);
      editBtn.onclick = () => startEditQueryTask(li);
      deleteBtn.onclick = () => deleteQueryTask(li);
      return li;
    }

    function completeQueryTask(li) {
      const id = li.dataset.id;
      const idx = allTasksCache.findIndex(t => String(t.id) === id);
      if (idx >= 0) {
        allTasksCache[idx].completed = true;
        allTasksCache[idx].completedAt = todayStr();
      }
      if (API_BASE) saveTasksToServer().catch(() => {});
      else saveTasks();
      applyTasks(allTasksCache);
      const state = getQueryState();
      if (state) runQuery(state.start, state.end);
      updateStats();
    }

    function startEditQueryTask(li) {
      startEdit(li, {
        onBeforeSave: (el) => {
          const id = el.dataset.id;
          const newText = el.querySelector('.task-text')?.textContent || '';
          const newDate = el.dataset.createdAt || todayStr();
          const idx = allTasksCache.findIndex(t => String(t.id) === id);
          if (idx >= 0) {
            allTasksCache[idx].text = newText;
            allTasksCache[idx].createdAt = newDate;
          }
          const mainLi = taskList.querySelector(`li[data-id="${id}"]`) || document.getElementById('done-list')?.querySelector(`li[data-id="${id}"]`);
          if (mainLi) {
            mainLi.dataset.createdAt = newDate;
            const t = mainLi.querySelector('.task-text');
            const d = mainLi.querySelector('.task-date');
            if (t) t.textContent = newText;
            if (d) d.textContent = newDate;
          }
        }
      });
      const saveBtn = li.querySelector('.btn-save');
      if (saveBtn) {
        const origOnclick = saveBtn.onclick;
        saveBtn.onclick = async function() {
          if (origOnclick) await origOnclick.call(this);
          const state = getQueryState();
          if (state) runQuery(state.start, state.end);
        };
      }
    }

    function deleteQueryTask(li) {
      const id = li.dataset.id;
      allTasksCache = allTasksCache.filter(t => String(t.id) !== id);
      const mainLi = taskList.querySelector(`li[data-id="${id}"]`) || document.getElementById('done-list')?.querySelector(`li[data-id="${id}"]`);
      if (mainLi) mainLi.remove();
      if (API_BASE) saveTasksToServer().catch(() => {});
      else saveTasks();
      li.remove();
      const state = getQueryState();
      if (state) runQuery(state.start, state.end);
      updateStats();
    }

    function undoQueryTask(li) {
      const id = li.dataset.id;
      const idx = allTasksCache.findIndex(t => String(t.id) === id);
      if (idx >= 0) {
        allTasksCache[idx].completed = false;
        allTasksCache[idx].completedAt = null;
      }
      if (API_BASE) saveTasksToServer().catch(() => {});
      else saveTasks();
      applyTasks(allTasksCache);
      const state = getQueryState();
      if (state) runQuery(state.start, state.end);
      updateStats();
    }

    function getQueryState() {
      try {
        const raw = sessionStorage.getItem(QUERY_STORAGE_KEY);
        return raw ? JSON.parse(raw) : null;
      } catch (e) { return null; }
    }

    function restoreAndRunQuery() {
      const endInput = document.getElementById('query-end');
      if (endInput && !endInput.value) endInput.value = todayStr();
      const state = getQueryState();
      if (!state || (!state.start && !state.end)) return;
      const startInput = document.getElementById('query-start');
      if (startInput) startInput.value = state.start || '';
      if (endInput) endInput.value = state.end || '';
      runQuery(state.start, state.end);
    }

    document.getElementById('btn-query')?.addEventListener('click', function() {
      const start = document.getElementById('query-start')?.value || '';
      const end = document.getElementById('query-end')?.value || '';
      runQuery(start, end);
    });

    async function pollAndMergeTasks() {
      if (!API_BASE) return;
      try {
        const res = await fetch(API_BASE + '/api/storage?key=todoList');
        if (res.status === 404) return;
        if (!res.ok) return;
        const data = await res.json();
        const remote = data.value;
        if (!Array.isArray(remote)) return;
        allTasksCache = remote;
        const local = getTasksSnapshot();
        const localStr = JSON.stringify(local);
        const remoteStr = JSON.stringify(remote);
        if (remoteStr !== localStr) {
          applyTasks(remote);
          restoreAndRunQuery();
        }
      } catch (err) {
        console.warn('Poll sync failed:', err);
      }
    }

    // 页面加载时初始化结束
  </script>
</body>
</html>
