<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>🎯 My Todo List</title>
  <meta name="description" content="Dream big, act daily, get things done.">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 20px;
      color: #333;
      -webkit-font-smoothing: antialiased;
    }

    .container {
      max-width: 900px;
      margin: 0 auto;
    }

    .app-card {
      background: white;
      border-radius: 20px;
      padding: 30px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    }

    .title {
      color: #667eea;
      text-align: center;
      margin-bottom: 10px;
      font-size: 2.5em;
    }
    .subtitle {
      text-align: center;
      color: #666;
      margin-bottom: 30px;
      font-style: italic;
    }

    .quote {
      background: #f0f4ff;
      padding: 15px;
      border-left: 4px solid #667eea;
      margin-bottom: 30px;
      border-radius: 5px;
      font-style: italic;
      color: #555;
    }

    .stats {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      padding: 20px;
      border-radius: 15px;
      text-align: center;
      margin-bottom: 30px;
    }
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 20px;
      margin-top: 15px;
    }
    .stat-item {
      background: rgba(255,255,255,0.2);
      padding: 15px;
      border-radius: 10px;
    }
    .stat-number { font-size: 2em; font-weight: bold; }
    .stat-label { font-size: 0.9em; opacity: 0.9; }

    .input-row {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
      align-items: center;
    }
    .input-row input {
      flex: 1;
      padding: 12px;
      border: 2px solid #e0e0e0;
      border-radius: 10px;
      font-size: 1em;
      transition: border-color 0.3s;
    }
    .input-row input:focus {
      outline: none;
      border-color: #667eea;
    }
    .btn-add {
      padding: 12px 24px;
      background: #667eea;
      color: white;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      font-size: 1em;
      transition: background 0.3s;
    }
    .btn-add:hover { background: #5568d3; }

    .task-list {
      list-style: none;
      padding: 0;
      margin: 0;
    }
    .task {
      background: #f8f9ff;
      padding: 15px;
      border-radius: 10px;
      margin-bottom: 10px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 15px;
      transition: transform 0.2s;
      border-left: 4px solid #ffa726;
    }
    .task:hover { transform: translateX(5px); }
    .task.completed {
      border-left: 4px solid #66bb6a;
      background: #f1f8f4;
    }
    .task-text { font-size: 1em; line-height: 1.5; }
    .task.completed .task-text {
      text-decoration: line-through;
      color: #888;
    }

    .actions { display: flex; gap: 10px; flex-wrap: wrap; }
    .actions button {
      padding: 6px 12px;
      font-size: 0.9em;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      transition: background 0.3s;
    }
    .btn-complete { background: #66bb6a; color: white; }
    .btn-complete:hover { background: #57a35a; }
    .btn-delete { background: #ef5350; color: white; }
    .btn-delete:hover { background: #e03e3a; }

    /* 手机端：与参考 HTML 一致 */
    @media (max-width: 768px) {
      body { padding: 20px; }
      .app-card { padding: 20px; }
      .title { font-size: 2em; }
      .stats-grid { grid-template-columns: 1fr; }
      .input-row {
        flex-direction: column;
        flex-wrap: wrap;
      }
      .input-row input { min-width: 0; width: 100%; }
      .btn-add { width: 100%; }
      .task { flex-direction: column; align-items: flex-start; }
      .actions { width: 100%; }
    }
    @media (max-width: 380px) {
      body { padding: 12px; }
      .title { font-size: 1.1rem; }
      .app-card { padding: 16px; }
      .input-row input, .btn-add { padding: 10px; }
      .task { padding: 10px; }
    }
  </style>
</head>
<body>
  <div class="container">
    <section class="app-card">
      <header>
        <h1 class="title">🎯 My Todo List</h1>
        <p class="subtitle">Dream big, act daily, get things done.</p>
      </header>

      <div class="quote" id="motivationalQuote">"The secret of getting ahead is getting started." - Mark Twain</div>

      <div class="stats">
        <h3 style="margin:0 0 5px 0;font-size:1.1em">📊 Task Overview</h3>
        <div class="stats-grid">
          <div class="stat-item">
            <div class="stat-number" id="statTotal">0</div>
            <div class="stat-label">Today's Tasks</div>
          </div>
          <div class="stat-item">
            <div class="stat-number" id="statCompleted">0</div>
            <div class="stat-label">Year's Completed</div>
          </div>
          <div class="stat-item">
            <div class="stat-number" id="statRate">0%</div>
            <div class="stat-label">Year's Rate</div>
          </div>
        </div>
      </div>

      <div class="input-row">
        <!-- 隐藏标签用于无障碍（屏幕阅读器） -->
        <label for="task-input" class="sr-only">输入新任务</label>
        <input id="task-input" type="text" placeholder="输入新任务，例如：完成项目报告">
        <button class="btn-add" aria-label="添加任务">添加</button>
      </div>

      <!-- 任务列表：预先放置 3 条示例数据，用于展示样式 -->
      <ul class="task-list" aria-live="polite">
        <!-- 单条任务结构：任务内容 + 操作按钮 -->
        <li class="task">
          <span class="task-text">完成项目报告</span>
          <div class="actions">
            <button class="btn-complete" aria-label="标记完成">完成</button>
            <button class="btn-delete" aria-label="删除任务">删除</button>
          </div>
        </li>

        <li class="task">
          <span class="task-text">买牛奶</span>
          <div class="actions">
            <button class="btn-complete" aria-label="标记完成">完成</button>
            <button class="btn-delete" aria-label="删除任务">删除</button>
          </div>
        </li>

        <li class="task completed">
          <span class="task-text">给妈妈打电话</span>
          <div class="actions">
            <button class="btn-complete" aria-label="标记未完成">取消</button>
            <button class="btn-delete" aria-label="删除任务">删除</button>
          </div>
        </li>
      </ul>

    </section>
  </div>

  <!-- 屏幕阅读器隐藏类 -->
  <style>
    .sr-only{position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;border:0}
  </style>

  <!-- 以下为原生 JavaScript：实现“添加任务”功能（含中文注释） -->
  <script>
    // 获取页面上的关键元素
    const taskInput = document.getElementById('task-input'); // 输入框
    const addButton = document.querySelector('.btn-add'); // 添加按钮
    const taskList = document.querySelector('.task-list'); // 任务列表容器

    /**
     * 创建一个任务列表项的 DOM 元素
     * @param {string} text 任务文本
     * @returns {HTMLElement} li 元素
     */
    // 创建任务元素：支持初始状态（completed）
    function createTaskElement(text, completed = false) {
      const li = document.createElement('li');
      li.className = 'task';
      if (completed) li.classList.add('completed');

      // 任务文本节点
      const span = document.createElement('span');
      span.className = 'task-text';
      span.textContent = text;

      // 操作按钮容器
      const actions = document.createElement('div');
      actions.className = 'actions';

      // 完成按钮（使用事件委托统一处理）
      const completeBtn = document.createElement('button');
      completeBtn.type = 'button';
      completeBtn.className = 'btn-complete';
      // 如果初始为已完成，则按钮文字显示为“取消”
      completeBtn.textContent = completed ? '取消' : '完成';

      // 删除按钮（使用事件委托统一处理）
      const deleteBtn = document.createElement('button');
      deleteBtn.type = 'button';
      deleteBtn.className = 'btn-delete';
      deleteBtn.textContent = '删除';

      // 组装节点
      actions.appendChild(completeBtn);
      actions.appendChild(deleteBtn);
      li.appendChild(span);
      li.appendChild(actions);

      return li;
    }

    /**
     * 添加任务：读取输入、校验非空、创建元素并追加到列表、清空输入
     */
    async function addTask() {
      const text = taskInput.value.trim();
      // 如果输入为空则不处理
      if (!text) return;

      const taskItem = createTaskElement(text);
      taskList.appendChild(taskItem);
      // 清空并聚焦输入框，方便继续添加
      taskInput.value = '';
      taskInput.focus();

      // 新增任务后保存当前列表到本地或远端
      if (API_BASE) await saveTasksToServer().catch(err => console.warn('保存到服务器失败：', err));
      else saveTasks();
      updateStats();
    }

    // 点击按钮触发添加
    addButton.addEventListener('click', addTask);

    // 按回车也触发添加，增强体验
    taskInput.addEventListener('keydown', function (e) {
      if (e.key === 'Enter') addTask();
    });

    /*
      使用事件委托统一处理任务列表中的“完成”和“删除”按钮。
      优点：
        - 对静态存在的任务按钮有效（页面加载时已在 DOM 中）
        - 对之后动态添加的任务也有效（无需为每个新按钮重复绑定事件）
        - 保持代码简洁，避免重复绑定导致的多次触发问题
    */
    taskList.addEventListener('click', async function (e) {
      const target = e.target;

      // 如果点击的是删除按钮，则只移除对应的任务项
      if (target.classList.contains('btn-delete')) {
        const li = target.closest('li.task');
        if (li) taskList.removeChild(li);
        if (API_BASE) await saveTasksToServer().catch(err => console.warn('保存到服务器失败：', err));
        else saveTasks();
        updateStats();
        return;
      }

      // 如果点击的是完成按钮，则切换该任务的完成状态（toggle）
      // 首次点击：添加 "completed" 样式 -> 显示删除线、变灰；按钮文字显示为 "取消"
      // 再次点击：移除 "completed" -> 恢复正常显示；按钮文字显示为 "完成"
      if (target.classList.contains('btn-complete')) {
        const li = target.closest('li.task');
        if (li) {
          li.classList.toggle('completed');
          // 根据当前状态设置按钮文字为“取消”或“完成”
          target.textContent = li.classList.contains('completed') ? '取消' : '完成';
          // 状态改变后保存（远端或本地）
          if (API_BASE) await saveTasksToServer().catch(err => console.warn('保存到服务器失败：', err));
          else saveTasks();
          updateStats();
        }
      }
    });

    /**
     * 将当前任务列表保存到 localStorage（key: "todoList"）
     * 数据格式为 JSON 数组，每项为 { text: string, completed: boolean }
     */
    function saveTasks() {
      const tasks = Array.from(taskList.querySelectorAll('li.task')).map(li => ({
        text: li.querySelector('.task-text').textContent,
        completed: li.classList.contains('completed')
      }));
      try {
        localStorage.setItem('todoList', JSON.stringify(tasks));
      } catch (err) {
        // localStorage 写入可能在隐私模式或存储被禁用时失败，这里静默处理
        console.warn('无法保存到 localStorage:', err);
      }
    }

    /**
     * 从 localStorage 读取任务并初始化列表
     * 如果没有已保存的数据，则初始化为空列表（符合需求）
     */
    function loadTasks() {
      try {
        const raw = localStorage.getItem('todoList');
        if (!raw) {
          taskList.innerHTML = '';
          updateStats();
          return;
        }
        const tasks = JSON.parse(raw);
        if (!Array.isArray(tasks)) throw new Error('格式不正确');

        // 清空当前列表并根据保存的数据重建
        taskList.innerHTML = '';
        tasks.forEach(t => {
          const li = createTaskElement(t.text, Boolean(t.completed));
          taskList.appendChild(li);
        });
        updateStats();
      } catch (err) {
        console.warn('读取 localStorage 失败，已初始化为空列表：', err);
        taskList.innerHTML = '';
      }
    }

    const API_BASE = 'https://willah.zeabur.app'; // 空字符串则仅用 localStorage；设为后端地址启用多端同步
    const SYNC_INTERVAL_MS = 3000; // 轮询间隔，多端实时更新
    let syncTimer = null;

    (async function init() {
      if (API_BASE) {
        try {
          await loadTasksFromServer();
          syncTimer = setInterval(pollAndMergeTasks, SYNC_INTERVAL_MS);
          return;
        } catch (err) {
          console.warn('从服务器加载失败，回退到 localStorage：', err);
        }
      }
      loadTasks();
    })();

    async function loadTasksFromServer() {
      const res = await fetch(API_BASE + '/api/storage?key=todoList');
      if (res.status === 404) {
        taskList.innerHTML = '';
        updateStats();
        return;
      }
      if (!res.ok) throw new Error('fetch failed');
      const data = await res.json();
      const tasks = data.value;
      if (!Array.isArray(tasks)) {
        taskList.innerHTML = '';
        updateStats();
        return;
      }
      taskList.innerHTML = '';
      tasks.forEach(t => {
        const li = createTaskElement(t.text, Boolean(t.completed));
        taskList.appendChild(li);
      });
      updateStats();
    }

    async function saveTasksToServer() {
      const tasks = Array.from(taskList.querySelectorAll('li.task')).map(li => ({
        text: li.querySelector('.task-text').textContent,
        completed: li.classList.contains('completed')
      }));
      const res = await fetch(API_BASE + '/api/storage', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ key: 'todoList', value: tasks })
      });
      if (!res.ok) throw new Error('save failed');
    }

    function getTasksSnapshot() {
      return Array.from(taskList.querySelectorAll('li.task')).map(li => ({
        text: li.querySelector('.task-text').textContent,
        completed: li.classList.contains('completed')
      }));
    }

    function updateStats() {
      const tasks = getTasksSnapshot();
      const total = tasks.length;
      const completed = tasks.filter(t => t.completed).length;
      const rate = total ? Math.round(completed / total * 100) : 0;
      const elTotal = document.getElementById('statTotal');
      const elCompleted = document.getElementById('statCompleted');
      const elRate = document.getElementById('statRate');
      if (elTotal) elTotal.textContent = total;
      if (elCompleted) elCompleted.textContent = completed;
      if (elRate) elRate.textContent = rate + '%';
    }

    function applyTasks(tasks) {
      if (!Array.isArray(tasks)) return;
      taskList.innerHTML = '';
      tasks.forEach(t => {
        const li = createTaskElement(t.text, Boolean(t.completed));
        taskList.appendChild(li);
      });
      updateStats();
    }

    async function pollAndMergeTasks() {
      if (!API_BASE) return;
      try {
        const res = await fetch(API_BASE + '/api/storage?key=todoList');
        if (res.status === 404) return;
        if (!res.ok) return;
        const data = await res.json();
        const remote = data.value;
        if (!Array.isArray(remote)) return;
        const local = getTasksSnapshot();
        const localStr = JSON.stringify(local);
        const remoteStr = JSON.stringify(remote);
        if (remoteStr !== localStr) applyTasks(remote);
      } catch (err) {
        console.warn('轮询同步失败：', err);
      }
    }

    // 页面加载时初始化结束
  </script>
</body>
</html>
